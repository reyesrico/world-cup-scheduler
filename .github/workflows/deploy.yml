name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Allow the GITHUB_TOKEN to deploy to Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          # Web3Forms access key for the feedback form. Store it as a repo SECRET:
          # Settings → Secrets and variables → Actions → Secrets → New secret
          #   Name: WEB3FORMS_KEY   Value: <your Web3Forms access key>
          # Keeping it in a secret keeps it out of the source and the CI logs.
          # (Vite still inlines it into the built bundle, which is fine — the key
          # only submits to your form and never exposes your email address.)
          VITE_WEB3FORMS_KEY: ${{ secrets.WEB3FORMS_KEY }}

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
